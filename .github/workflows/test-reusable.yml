name: Test Reusable

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Token length is ${#CLAUDE_CODE_OAUTH_TOKEN}"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

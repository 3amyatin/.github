name: Claude Code Review (Reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    if: >
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Analyze the code changes for bugs,
            security issues, and improvements.
            For each issue found, post an inline comment on the specific line
            using create_inline_comment. Include code suggestions using
            ```suggestion blocks where appropriate.
            After all inline comments, post a summary review comment.
          claude_args: "--allowedTools 'Read,Glob,Grep,Bash(gh *),mcp__github_inline_comment__create_inline_comment,mcp__github_comment__create_or_update_comment'"
          additional_permissions: |
            actions: read

name: Claude Code Review (Reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    if: >
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write Context7 MCP config
        run: |
          cat > /tmp/context7-mcp.json << 'MCPEOF'
          {"mcpServers":{"context7":{"command":"npx","args":["-y","@upstash/context7-mcp"]}}}
          MCPEOF

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request. Analyze the code changes for bugs,
            security issues, and improvements.
            When reviewing code that uses external libraries, use Context7
            to look up current documentation and verify API usage.
            For each issue found, post an inline comment on the specific line
            using create_inline_comment. Include code suggestions using
            ```suggestion blocks where appropriate.
            After all inline comments, post a summary review comment.
          claude_args: "--allowedTools 'Read,Glob,Grep,Bash(gh *),mcp__github_inline_comment__create_inline_comment,mcp__github_comment__create_or_update_comment,mcp__context7__resolve-library-id,mcp__context7__query-docs' --mcp-config /tmp/context7-mcp.json"
          additional_permissions: |
            actions: read
